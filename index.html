  if (!skuCount) { toast('SKU data not loaded yet — try again in a moment', 'err'); return; }

  document.getElementById('bsm-title').textContent =
    (isSet ? 'Set' : 'Add') + ' ' + (isRetail ? 'Retail' : 'Bulk') + ' SKUs';
  document.getElementById('bsm-desc').textContent =
    (isSet ? 'Replaces' : 'Adds to') + ' the ' + (isRetail?'retail':'bulk') +
    ' SKU list on all ' + n + ' selected stores.';

  // Update apply button count
  const applyBtn = document.querySelector('#bulk-sku-modal .btn-ink');
  if (applyBtn) applyBtn.textContent = 'Apply to ' + n + ' store' + (n===1?'':'s');

  // Build SKU list
  window._bsmAllSkus = Object.entries(window.SKUS_RAW || {})
    .filter(([,v]) => isRetail ? !v.is_bulk : v.is_bulk)
    .sort(([a],[b]) => a.localeCompare(b));

  // Pre-check SKUs common to ALL selected stores
  const selected = [...window._bulkSel].map(c => storeConfig[c]).filter(Boolean);
  const field    = isRetail ? 'retail_skus' : 'bulk_skus';
  const common   = selected.length
    ? new Set(selected[0][field] || [])
    : new Set();
  if (selected.length > 1) {
    selected.slice(1).forEach(s => {
      const set = new Set(s[field] || []);
      [...common].forEach(k => { if (!set.has(k)) common.delete(k); });
    });
  }

  renderBsmList(common);
  document.getElementById('bsm-search').value = '';
  const bsmEl = document.getElementById('bulk-sku-modal');
  bsmEl.style.display = 'flex';
  bsmEl.style.pointerEvents = 'auto';
}

function renderBsmList(checked) {
  const list = document.getElementById('bsm-list');
  if (!list) return;
  list.innerHTML = window._bsmAllSkus.map(([sku, v]) => {
    const isChecked = checked ? checked.has(sku) : false;
    return `<label style="display:flex;align-items:center;gap:8px;padding:4px 6px;border-radius:5px;cursor:pointer;font-size:12px;">
      <input type="checkbox" value="${sku}" ${isChecked?'checked':''} style="flex-shrink:0;">
      <span class="tmono" style="font-size:11px;color:var(--ink3);min-width:60px;">${sku}</span>
      <span style="color:var(--ink2);">${v.name}</span>
    </label>`;
  }).join('');
}

function filterBsmList() {
  const q = (document.getElementById('bsm-search')?.value || '').toLowerCase();
  document.querySelectorAll('#bsm-list label').forEach(lbl => {
    lbl.style.display = (!q || lbl.textContent.toLowerCase().includes(q)) ? '' : 'none';
  });
}

function bsmSelectAll() {
  document.querySelectorAll('#bsm-list input[type=checkbox]').forEach(cb => {
    if (cb.closest('label').style.display !== 'none') cb.checked = true;
  });
}

function bsmSelectNone() {
  document.querySelectorAll('#bsm-list input[type=checkbox]').forEach(cb => cb.checked = false);
}

function closeBulkSkuModal() {
  const bsmClose = document.getElementById('bulk-sku-modal');
  bsmClose.style.display = 'none';
  bsmClose.style.pointerEvents = 'none';
}

function applyBulkSkus() {
  const checked = [...document.querySelectorAll('#bsm-list input[type=checkbox]:checked')]
    .map(cb => cb.value);
  const field   = window._bsmType === 'retail' ? 'retail_skus' : 'bulk_skus';
  const codes   = [...window._bulkSel];

  codes.forEach(code => {
    if (!storeConfig[code]) return;
    if (window._bsmMode === 'set') {
      storeConfig[code][field] = [...checked];
    } else {
      const existing = new Set(storeConfig[code][field] || []);
      checked.forEach(s => existing.add(s));
      storeConfig[code][field] = [...existing].sort();
    }
  });

  codes.forEach(code => window._pendingChanges.add(code));
  closeBulkSkuModal();
  updatePendingBar();
  toast(codes.length + ' stores staged — hit Save to confirm', '');
}

function bulkGeneratePins() {
  const ORDERING = ['store-all','you-retail-store-bulk','store-bulk-only'];
  const stores = Object.values(storeConfig).filter(s => ORDERING.includes(s.order_type));
  const withPin    = stores.filter(s => s.pin);
  const withoutPin = stores.filter(s => !s.pin);

  const msg = withoutPin.length === 0
    ? 'All ' + stores.length + ' ordering stores already have PINs set.\n\nRegenerate all PINs anyway?'
    : withoutPin.length + ' of ' + stores.length + ' stores are missing PINs.\n\nGenerate 6-digit PINs for stores without one?\n(Stores that already have a PIN will be left unchanged)';

  if (!confirm(msg)) return;

  // Generate unique 6-digit PINs
  const usedPins = new Set([
    window._adminPin,
    ...stores.map(s => s.pin).filter(Boolean)
  ]);

  function genPin() {
    let pin;
    do { pin = String(Math.floor(100000 + Math.random() * 900000)); }
    while (usedPins.has(pin));
    usedPins.add(pin);
    return pin;
  }

  const toSave = [];
  stores.forEach(s => {
    if (!s.pin) {
      s.pin = genPin();
      toSave.push(s.code);
    }
  });

  if (!toSave.length) { toast('No new PINs needed', ''); return; }

  // Stage and save
  toSave.forEach(code => window._pendingChanges.add(code));
  updatePendingBar();
  renderAccessTable();
  toast('Generated PINs for ' + toSave.length + ' stores — hit Save to confirm', '');
}

function setAllStoresActive(active) {
  Object.values(storeConfig).forEach(s => {
    if (s.order_type !== 'you-all') {
      s.portal_active = active;
      saveAdminConfig(s.code);
    }
  });
  renderStoreAccess();
  renderAdminGrid();
  toast(active ? 'All stores enabled' : 'All stores disabled', active ? 'ok' : '');
}

function saveStorePin(code) {
  const inp = document.getElementById('pin-' + code);
  if (!inp) return;
  const pin = inp.value.trim();
  if (!pin) { toast('Enter a PIN first','err'); return; }
  storeConfig[code].pin = pin;
  inp.value = '';
  inp.placeholder = '••••••';
  writeAdminConfigNow(code);
  renderAccessTable();
  toast(code + ' PIN set ✓','ok');
}

function clearStorePin(code) {
  storeConfig[code].pin = '';
  writeAdminConfigNow(code);
  renderAccessTable();
  toast(code + ' PIN cleared','ok');
}




function toast(msg, type='') {
  const t = document.getElementById('toast');
  document.getElementById('tmsg').textContent = msg;
  t.className = 'toast show' + (type?' '+type:'');
  setTimeout(()=>t.className='toast', 3000);
}

// ═══════════════════════════════════════════════════════════════
// BOOT — fetch live data from sheet if URL configured
// ═══════════════════════════════════════════════════════════════

async function loadData() {
  const statusEl = document.getElementById('loading-status');

  if (MASTER_URL) {
    try {
      showLoadingScreen('Checking active week…');
      if (statusEl) statusEl.textContent = '⏳ Syncing live data…';

      // Step 1: get active week URL
      try {
        const masterRes  = await fetch(MASTER_URL + '?action=get_active_url&t=' + Date.now());
        const masterJson = await masterRes.json();
        if (masterJson.ok && masterJson.active_url) {
          SHEETS_URL = masterJson.active_url;
          if (masterJson.active_week) {
            window._liveWeek = masterJson.active_week;
            WEEK = masterJson.active_week;
          }
        }
      } catch(masterErr) {
        console.warn('Master URL check failed, using MASTER_URL directly:', masterErr);
        SHEETS_URL = MASTER_URL;
      }

      // Step 2: boot_data — store list + SKUs, no day-sheet scanning (fast)
      showLoadingScreen('Loading week data…');
      const res  = await fetch(SHEETS_URL + '?action=boot_data&t=' + Date.now());
      const json = await res.json();
      if (json.stores && json.skus) {
        window.STORES_RAW = json.stores;
        window.SKUS_RAW   = json.skus;
        if (json.week && !window._liveWeek) window._liveWeek = json.week;
        if (window._liveWeek) WEEK = window._liveWeek;
        if (json.monday) WEEK_MONDAY = new Date(json.monday);
        if (json.dayDates) window.DAY_DATES = json.dayDates;
        if (json.admin_pin !== undefined) window._adminPin = json.admin_pin;
        initConfig();
        dataReady = true;
        hideLoadingScreen();
        const lb = document.getElementById('login-btn');
        if (lb) lb.textContent = 'Sign In →';
        if (statusEl) statusEl.textContent = '✓ Live — W' + WEEK;
        toast('Live data loaded — W' + (window._liveWeek || WEEK) + ' ✓','ok');
        return;
      }
    } catch(err) {
      console.warn('Sheet fetch failed, using offline data:', err);
      toast('Sheet unavailable — using offline data','');
    }
  } else {
    showLoadingScreen('Loading offline data…');
    await new Promise(r => setTimeout(r, 300));
  }

  // Fallback: offline data
  window.STORES_RAW = OFFLINE_STORES;
  window.SKUS_RAW   = OFFLINE_SKUS;
  initConfig();
  dataReady = true;
  hideLoadingScreen();
  const lb2 = document.getElementById('login-btn');
  if (lb2) lb2.textContent = 'Sign In →';
  if (statusEl) statusEl.textContent = '⚠ Offline data';
}

function showLoadingScreen(msg) {
  let el = document.getElementById('loading-screen');
  if (!el) {
    el = document.createElement('div');
    el.id = 'loading-screen';
    el.style.cssText = 'position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:12px;';
    el.innerHTML = '<div style="font-size:28px;font-weight:900;letter-spacing:-1px;">Positive<span style=color:var(--acc)>Portal</span></div><div id="loading-msg" style="font-family:IBM Plex Mono,monospace;font-size:11px;color:var(--ink3);letter-spacing:2px;text-transform:uppercase;"></div><div style="width:180px;height:2px;background:var(--bdr);border-radius:2px;overflow:hidden;"><div id="loading-bar" style="height:100%;background:var(--acc);width:0%;transition:width 1.5s ease;"></div></div>';
    document.body.appendChild(el);
  }
  document.getElementById('loading-msg').textContent = msg;
  setTimeout(()=>{ const b=document.getElementById('loading-bar'); if(b) b.style.width='80%'; }, 50);
}

function hideLoadingScreen() {
  const el = document.getElementById('loading-screen');
  if (el) {
    el.style.pointerEvents = 'none'; // immediately stop blocking clicks
    el.style.opacity = '0';
    el.style.transition = 'opacity .3s';
    setTimeout(() => el.remove(), 300);
  }
}

loadData();
</script>
