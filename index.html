<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Positive Portal</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Epilogue:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f1ec;--surf:#fff;--surf2:#edeae4;--surf3:#e4e0d8;
  --bdr:#dedad2;--bdr2:#ccc7be;
  --ink:#1a1714;--ink2:#4a453f;--ink3:#8c877f;
  --acc:#c8420a;--acc-l:#fdf0eb;--acc-b:#f0b89a;
  --grn:#1a7a4a;--grn-l:#edf7f2;--grn-b:#a8d8be;
  --blu:#1a4a8a;--blu-l:#edf2fa;--blu-b:#a8bedd;
  --pur:#5a1a8a;--pur-l:#f3edf9;--pur-b:#c8a8e8;
  --yel:#b87d00;--yel-l:#fdf8ed;--yel-b:#e8d080;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:'Epilogue',sans-serif;min-height:100vh;font-size:14px;}

/* ── TOPBAR ── */
.topbar{background:var(--surf);border-bottom:1px solid var(--bdr);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:200;}
.tb-brand{font-size:18px;font-weight:900;letter-spacing:-1px;}
.tb-brand span{color:var(--acc);}
.tb-right{display:flex;align-items:center;gap:8px;}
.uchip{display:flex;align-items:center;gap:6px;background:var(--surf2);border:1px solid var(--bdr);border-radius:20px;padding:3px 10px 3px 4px;font-size:12px;font-weight:600;}
.uav{width:24px;height:24px;border-radius:50%;color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* ── BUTTONS ── */
.btn{padding:6px 13px;border-radius:6px;font-family:'Epilogue',sans-serif;font-size:12px;font-weight:700;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap;}
.btn-ghost{background:transparent;border:1px solid var(--bdr2);color:var(--ink2);}.btn-ghost:hover{border-color:var(--ink);color:var(--ink);}
.btn-ink{background:var(--ink);color:#fff;}.btn-ink:hover{background:#2a2724;}
.btn-acc{background:var(--acc);color:#fff;}.btn-acc:hover{background:#a8340a;}
.btn-grn{background:var(--grn);color:#fff;}.btn-grn:hover{background:#155c38;}
.btn-blu{background:var(--blu);color:#fff;}.btn-blu:hover{background:#133870;}
.btn-yel{background:var(--yel);color:#fff;}.btn-yel:hover{background:#9a6a00;}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.btn-sm{padding:4px 9px;font-size:11px;}

/* ── NAV TABS ── */
.nav{display:flex;border-bottom:1px solid var(--bdr);background:var(--surf);padding:0 20px;}
.nav-tab{padding:10px 14px;font-size:13px;font-weight:700;cursor:pointer;color:var(--ink3);border-bottom:2px solid transparent;transition:all .15s;display:flex;align-items:center;gap:6px;}
.nav-tab:hover{color:var(--ink);}
.nav-tab.act{color:var(--acc);border-bottom-color:var(--acc);}
.nbadge{font-family:'IBM Plex Mono',monospace;font-size:9px;padding:1px 5px;border-radius:8px;background:var(--acc);color:#fff;}

/* ── LAYOUT ── */
.page{display:none;padding:24px 20px;max-width:1280px;margin:0 auto;}
.page.act{display:block;animation:fi .2s ease;}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.phdr{margin-bottom:20px;}
.ptitle{font-size:24px;font-weight:900;letter-spacing:-1px;}
.psub{font-size:13px;color:var(--ink3);margin-top:3px;}

/* ── CARDS ── */
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;}
.card-hdr{padding:11px 16px;border-bottom:1px solid var(--bdr);background:var(--surf2);display:flex;align-items:center;justify-content:space-between;gap:10px;}
.card-title{font-size:13px;font-weight:800;}
.card-sub{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink3);}

/* ── STATS ROW ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
.stat{background:var(--surf);border:1px solid var(--bdr);border-radius:9px;padding:13px 15px;}
.stat-lbl{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);margin-bottom:4px;}
.stat-val{font-size:24px;font-weight:900;letter-spacing:-1px;}
.stat-sub{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--ink3);margin-top:2px;}

/* ── STORE GRID (admin) ── */
.store-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;}
.scard{background:var(--surf);border:1px solid var(--bdr);border-radius:9px;padding:13px;cursor:pointer;transition:box-shadow .15s;position:relative;}
.scard:hover{box-shadow:0 2px 12px rgba(0,0,0,.08);}
.scard.sel{border-color:var(--acc);box-shadow:0 0 0 2px var(--acc-b);}
.sc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.sc-code{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;}
.sc-brand{font-size:11px;color:var(--ink3);margin-top:1px;}
.sc-bottom{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}

/* ── PILLS ── */
.pill{font-family:'IBM Plex Mono',monospace;font-size:8px;padding:2px 7px;border-radius:3px;font-weight:600;letter-spacing:.3px;white-space:nowrap;}
.pill-WFM{background:#dbeafe;color:#1e3a8a;}
.pill-GEL{background:#ede9fe;color:#4c1d95;}
.pill-USC{background:#ffe4e6;color:#9f1239;}
.pill-BFM{background:#fef3cd;color:#856404;}
.pill-ERT{background:#d4edda;color:#155724;}
.pill-def{background:var(--surf2);color:var(--ink3);}
.pill-NORCAL{background:#e0f2fe;color:#0c4a6e;}
.pill-SOCAL{background:#fce7f3;color:#831843;}

.ot-pill{font-family:'IBM Plex Mono',monospace;font-size:8px;padding:2px 8px;border-radius:10px;font-weight:700;letter-spacing:.3px;}
.ot-you-all{background:#f0ede8;color:var(--ink3);border:1px solid var(--bdr);}
.ot-store-all{background:var(--grn-l);color:var(--grn);border:1px solid var(--grn-b);}
.ot-you-retail-store-bulk{background:var(--blu-l);color:var(--blu);border:1px solid var(--blu-b);}
.ot-store-bulk-only{background:var(--pur-l);color:var(--pur);border:1px solid var(--pur-b);}

/* ── DETAIL PANEL ── */
.detail-wrap{display:grid;grid-template-columns:1fr 360px;gap:14px;margin-top:16px;}
.detail-panel{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:18px;}
.dp-title{font-size:16px;font-weight:900;letter-spacing:-.5px;margin-bottom:4px;}
.dp-sub{font-size:12px;color:var(--ink3);margin-bottom:16px;}
.dp-section{margin-bottom:18px;}
.dp-sec-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--bdr);}

/* ── ORDER TYPE SELECTOR ── */
.ot-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.ot-opt{border:1px solid var(--bdr);border-radius:7px;padding:10px 12px;cursor:pointer;transition:all .15s;}
.ot-opt:hover{border-color:var(--ink);background:var(--surf2);}
.ot-opt.sel{border-color:var(--acc);background:var(--acc-l);}
.ot-opt-title{font-size:12px;font-weight:800;margin-bottom:2px;}
.ot-opt-desc{font-size:11px;color:var(--ink3);line-height:1.4;}

/* ── SKU TOGGLE LIST ── */
.sku-list{display:flex;flex-direction:column;gap:4px;max-height:320px;overflow-y:auto;}
.sku-row{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:6px;border:1px solid var(--bdr);cursor:pointer;transition:background .1s;}
.sku-row:hover{background:var(--surf2);}
.sku-row.on{background:var(--grn-l);border-color:var(--grn-b);}
.sku-row.bulk-row.on{background:var(--blu-l);border-color:var(--blu-b);}
.sku-tog{width:16px;height:16px;border-radius:3px;border:1.5px solid var(--bdr2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .1s;}
.sku-row.on .sku-tog{background:var(--grn);border-color:var(--grn);color:#fff;}
.sku-row.bulk-row.on .sku-tog{background:var(--blu);border-color:var(--blu);color:#fff;}
.sku-code{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--ink3);width:52px;flex-shrink:0;}
.sku-name{font-size:11px;flex:1;line-height:1.3;}
.sku-cat{font-family:'IBM Plex Mono',monospace;font-size:8px;padding:1px 5px;border-radius:2px;}

/* ── FILTERS ── */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
.filter-inp{padding:7px 11px;background:var(--surf);border:1px solid var(--bdr);border-radius:6px;font-family:'Epilogue',sans-serif;font-size:13px;color:var(--ink);outline:none;width:220px;}
.filter-inp:focus{border-color:var(--acc);}
.filter-sel{padding:7px 11px;background:var(--surf);border:1px solid var(--bdr);border-radius:6px;font-family:'Epilogue',sans-serif;font-size:12px;color:var(--ink);outline:none;appearance:none;cursor:pointer;}

/* ── ALERTS ── */
.alert{border-radius:8px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px;font-size:12px;line-height:1.5;}
.alert-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.alert-grn{background:var(--grn-l);border:1px solid var(--grn-b);}.alert-grn .alert-dot{background:var(--grn);}
.alert-blu{background:var(--blu-l);border:1px solid var(--blu-b);}.alert-blu .alert-dot{background:var(--blu);}
.alert-yel{background:var(--yel-l);border:1px solid var(--yel-b);}.alert-yel .alert-dot{background:var(--yel);}

/* ── ORDER FORM ── */
.order-sect{background:var(--surf);border:1px solid var(--bdr);border-radius:9px;margin-bottom:10px;overflow:hidden;}
.order-sect-hdr{padding:10px 16px;background:var(--surf2);border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;}
.order-sect-title{font-size:12px;font-weight:800;display:flex;align-items:center;gap:6px;}
.order-sect-locked{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--ink3);display:flex;align-items:center;gap:4px;}
.orow{display:grid;grid-template-columns:52px 1fr 72px 108px 60px;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--bdr);transition:background .1s;}
.orow:last-child{border-bottom:none;}
.orow:hover{background:var(--surf2);}
.orow.changed{background:#fffcef;}
.orow.locked{opacity:.5;pointer-events:none;}
.orow-sku{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--ink3);}
.orow-name{font-size:12px;font-weight:600;line-height:1.3;}
.orow-prev{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--ink3);}
.orow-price{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink3);text-align:right;}
.qctl{display:flex;align-items:center;background:var(--surf2);border:1px solid var(--bdr);border-radius:5px;overflow:hidden;}
.qbtn{width:26px;height:26px;background:transparent;border:none;cursor:pointer;font-size:13px;font-weight:700;color:var(--ink2);display:flex;align-items:center;justify-content:center;}
.qbtn:hover{background:var(--bdr);}
.qinp{width:38px;height:26px;background:transparent;border:none;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;outline:none;}
.orow-total{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;text-align:right;}
.order-footer{background:var(--surf);border:1px solid var(--bdr);border-radius:9px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
.of-totals{display:flex;gap:20px;}
.of-lbl{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);margin-bottom:2px;}
.of-val{font-size:20px;font-weight:900;letter-spacing:-1px;}

/* ── TABLE ── */
table{width:100%;border-collapse:collapse;font-size:12px;}
thead tr{background:var(--surf2);}
th{padding:8px 12px;text-align:left;font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);border-bottom:1px solid var(--bdr);font-weight:500;white-space:nowrap;}
td{padding:8px 12px;border-bottom:1px solid var(--bdr);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surf2);}
.tmono{font-family:'IBM Plex Mono',monospace;font-size:11px;}
.tbold{font-weight:900;font-size:15px;}

/* ── LOGIN ── */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.lbox{width:100%;max-width:440px;}
.l-brand{text-align:center;margin-bottom:28px;}
.l-brand-name{font-size:38px;font-weight:900;letter-spacing:-2px;}
.l-brand-name span{color:var(--acc);}
.l-brand-sub{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--ink3);text-transform:uppercase;margin-top:3px;}
.lcard{background:var(--surf);border:1px solid var(--bdr);border-radius:14px;padding:26px;box-shadow:0 4px 24px rgba(0,0,0,.07);overflow:visible;}
.lcard-title{font-size:16px;font-weight:800;margin-bottom:14px;}
.lfl{margin-bottom:11px;}
.lfl label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--ink3);margin-bottom:4px;display:block;}
.lfi{width:100%;padding:8px 12px;background:var(--surf2);border:1px solid var(--bdr);border-radius:6px;font-family:'Epilogue',sans-serif;font-size:13px;color:var(--ink);outline:none;}.lfs{width:100%;padding:8px 12px;background:var(--surf2);border:1px solid var(--bdr);border-radius:6px;font-family:'Epilogue',sans-serif;font-size:13px;color:var(--ink);outline:none;cursor:pointer;pointer-events:auto;position:relative;z-index:10;}
.lfi:focus,.lfs:focus{border-color:var(--acc);background:var(--surf);}
.lbtn{width:100%;padding:10px;background:var(--ink);color:#fff;border:none;border-radius:7px;font-family:'Epilogue',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:5px;}
.lbtn:hover{background:var(--acc);}
.quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:16px;padding-top:16px;border-top:1px solid var(--bdr);}
.qlogin{padding:9px 5px;border:1px solid var(--bdr);border-radius:7px;background:var(--surf2);cursor:pointer;text-align:center;transition:all .15s;}
.qlogin:hover{border-color:var(--ink);background:var(--surf);}
.ql-icon{font-size:15px;margin-bottom:2px;}
.ql-name{font-weight:700;font-size:11px;}
.ql-sub{color:var(--ink3);font-size:9px;font-family:'IBM Plex Mono',monospace;}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;right:20px;background:var(--ink);color:#fff;border-radius:7px;padding:10px 15px;font-size:13px;font-weight:600;z-index:999;transform:translateY(50px);opacity:0;transition:all .3s;display:flex;align-items:center;gap:6px;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.ok{background:var(--grn);}
.toast.err{background:var(--acc);}

/* ── MISC ── */
.divider{height:1px;background:var(--bdr);margin:16px 0;}
.mono{font-family:'IBM Plex Mono',monospace;}
.empty{text-align:center;padding:40px;color:var(--ink3);font-size:13px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="lbox">
    <div class="l-brand">
      <div class="l-brand-name">Positive<span>Portal</span></div>
      <div class="l-brand-sub">Order Portal · 2026</div>
    </div>
    <div class="lcard">
      <div class="lcard-title">Sign in</div>
      <div class="lfl">
        <label>Access Code</label>
        <input class="lfi" type="password" id="lc" placeholder="Enter your access code"
          onkeydown="if(event.key==='Enter') doLogin()" autocomplete="off" />
      </div>
      <button class="lbtn" id="login-btn" onclick="doLogin()">Sign In →</button>
      <div id="loading-status" style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink3);text-align:center;margin-top:8px;letter-spacing:1px;">⏳ Syncing live data…</div>
    </div>
  </div>
</div>

<!-- Hidden optgroups still needed for populateLoginUI compatibility -->
<div style="display:none">
  <select id="ls"><option value=""></option>
    <optgroup id="lg-self-order"></optgroup>
    <optgroup id="lg-bulk-order"></optgroup>
    <optgroup id="lg-bulk-only"></optgroup>
  </select>
  <div id="quick-grid-container"></div>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <div class="topbar">
    <div class="tb-brand">Positive<span>Portal</span></div>
    <div class="tb-right">
      <div class="uchip">
        <div class="uav" id="uav">?</div>
        <span id="ulbl">—</span>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">Sign out</button>
    </div>
  </div>

  <div class="nav" id="nav"></div>

  <div id="page-orders"  class="page"></div>
  <div id="page-admin"   class="page"></div>
  <div id="page-access"  class="page"></div>
  <div id="page-summary" class="page"></div>
  <div id="page-weekmgr" class="page"></div>
</div>

<div class="toast" id="toast"><span id="tmsg"></span></div>

<!-- Global bulk SKU modal -->
<div id="bulk-sku-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;align-items:center;justify-content:center;pointer-events:none;">
  <div style="background:var(--bg);border:1px solid var(--bdr);border-radius:12px;padding:24px;width:min(460px,92vw);max-height:80vh;display:flex;flex-direction:column;gap:12px;">
    <div style="font-weight:800;font-size:15px;" id="bsm-title">Set SKUs</div>
    <div style="font-size:12px;color:var(--ink3);" id="bsm-desc"></div>
    <input id="bsm-search" class="filter-inp" placeholder="Filter SKUs…" oninput="filterBsmList()" style="width:100%;box-sizing:border-box;">
    <div style="display:flex;gap:8px;">
      <button class="btn btn-ghost btn-sm" onclick="bsmSelectAll()">All</button>
      <button class="btn btn-ghost btn-sm" onclick="bsmSelectNone()">None</button>
    </div>
    <div id="bsm-list" style="overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:3px;min-height:100px;max-height:260px;"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;padding-top:4px;">
      <button class="btn btn-ghost" onclick="closeBulkSkuModal()">Cancel</button>
      <button class="btn btn-ink" id="bsm-apply-btn" onclick="applyBulkSkus()">Apply</button>
    </div>
  </div>
</div>

<!-- Global pending changes bar -->
<div id="pending-bar" style="display:none;position:fixed;bottom:0;left:0;right:0;background:var(--ink);color:#fff;padding:12px 20px;z-index:1500;align-items:center;gap:12px;box-shadow:0 -2px 12px rgba(0,0,0,.2);pointer-events:none;">
  <span id="pending-count" style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;flex:1;">0 unsaved changes</span>
  <button class="btn btn-sm" style="background:var(--surf2);color:var(--ink);border-color:var(--bdr);" onclick="discardPendingChanges()">Discard</button>
  <button class="btn btn-sm" style="background:var(--acc);color:#fff;border-color:var(--acc);" onclick="savePendingChanges()">Save changes</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// EMBEDDED DATA (from your actual W10 forecast sheet)
// ═══════════════════════════════════════════════════════════════
</script>
<script id="data-script">
// ── MASTER URL — your permanent endpoint, paste once and never change ──
// This URL never changes. On boot the portal asks it for the current
// active week's URL, then redirects all data calls there automatically.
const MASTER_URL = 'https://script.google.com/macros/s/AKfycbwOS6pSTIAHYdyOBuPpD1iR64MJivp3VFb_QRNxp67Eks7ofoN-DnkBaBoHZjfKDmH6/exec';

// Active week URL — resolved dynamically from MASTER_URL on boot.
// Starts as MASTER_URL, gets replaced with current week's URL after boot.
let SHEETS_URL = MASTER_URL;
// Leave MASTER_URL blank to use offline demo data (the baked-in W10 data below)
// ── Offline fallback data (W10 actuals) ──────────────────────

<script>
// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════

// Live store config — admin can edit, persists in-session
let storeConfig = {};   // code → { order_type, retail_skus, bulk_skus }
let dataReady = false;  // true once loadData() completes
let orders = {};        // "code:week:day" → { qtys:{sku:qty}, status, notes, submittedAt }
let USER = null;        // { role:'admin'|'store', code? }
let activePage = null;
let adminSelectedStore = null;

let WEEK = 11; // overridden by live sheet data on load
let WEEK_MONDAY = null; // actual Monday date from sheet — set in loadData()

// Returns the DELIVERY date for a given order day tab
// MON order → THU delivery (+3)
// TUE order → FRI delivery (+3)
// WED order → SAT delivery (+3)
// THU order → MON delivery (+4, skip weekend)
// FRI order → TUE delivery (+4, skip weekend)
// SAT order → WED delivery (+4, skip weekend)
function getDayDate(orderDay) {
  // Get the base date for this delivery day from the sheet (B5 of each day tab)
  // If cutoff has already passed, show next week's date (+7 days)
  let baseDate;

  if (window.DAY_DATES && window.DAY_DATES[orderDay]) {
    const [m, d] = window.DAY_DATES[orderDay].split('/').map(Number);
    baseDate = new Date(2026, m - 1, d);
  } else {
    // Fallback: calculate from week Monday date
    const orderDayOffset = { MON:0, TUE:1, WED:2, THU:3, FRI:4, SAT:5, SUN:6 };
    let currentWeekMon;
    if (WEEK_MONDAY) {
      currentWeekMon = new Date(WEEK_MONDAY);
    } else {
      const week1Mon = new Date(2025, 11, 29);
      currentWeekMon = new Date(week1Mon);
      currentWeekMon.setDate(week1Mon.getDate() + (WEEK - 1) * 7);
    }
    baseDate = new Date(currentWeekMon);
    baseDate.setDate(currentWeekMon.getDate() + (orderDayOffset[orderDay] || 0));
  }

  // If cutoff has passed for this day, show next week's date
  if (isDayLocked(orderDay)) {
    baseDate.setDate(baseDate.getDate() + 7);
  }

  return orderDay + ' ' + (baseDate.getMonth()+1) + '/' + baseDate.getDate();
}

const ORDER_TYPES = {
  'you-all':                { label:'You — All',          desc:'You forecast everything. Store never sees portal.',      color:'var(--ink3)' },
  'store-all':              { label:'Store — All',         desc:'Store orders all their own SKUs.',                       color:'var(--grn)'  },
  'you-retail-store-bulk':  { label:'Mixed: Store=Bulk',   desc:'You do retail, store orders their bulk items.',          color:'var(--blu)'  },
  'store-bulk-only':        { label:'Store — Bulk Only',   desc:'Store only orders bulk. No retail section shown.',       color:'var(--pur)'  },
};

const CAT_COLOR = { ENTREES:'#c8420a', SALADS:'#1a7a4a', PUDDINGS:'#5a1a8a', SANDWICH:'#1a4a8a', 'SNACK BOX':'#b87d00', COPACK:'#6b7280', BULK:'#374151', 'GENERAL SALES':'#6b7280' };

// ── Init store config from raw data ──────────────────────────
function initConfig() {
  storeConfig = {};
  STORES_RAW.forEach(s => {
    storeConfig[s.code] = {
      code:          s.code,
      order_type:    s.order_type,
      retail_skus:   [...(s.retail_skus || [])],
      bulk_skus:     [...(s.bulk_skus   || [])],
      brand:         s.brand,
      print_name:    s.print_name || '',
      region:        s.region,
      route:         s.route,
      tier:          s.tier,
      price_key:     s.price_key || 'DIRECT',
      days:          s.days || {},
      revenue:       s.revenue || 0,
      portal_active: s.portal_active !== false, // default true
      pin:           s.pin || '',
    };
  });
  populateLoginUI();
}

function populateLoginUI() {
  const selfOrder = document.getElementById('lg-self-order');
  const bulkOrder = document.getElementById('lg-bulk-order');
  const bulkOnly  = document.getElementById('lg-bulk-only');
  const quickGrid = document.getElementById('quick-grid-container');
  if (!selfOrder || !bulkOrder || !bulkOnly || !quickGrid) return;

  selfOrder.innerHTML = '';
  bulkOrder.innerHTML = '';
  bulkOnly.innerHTML  = '';

  const stores = Object.values(storeConfig)
    .filter(s => ['store-all','you-retail-store-bulk','store-bulk-only'].includes(s.order_type) && s.portal_active !== false)
    .sort((a,b) => a.order_type.localeCompare(b.order_type) || a.code.localeCompare(b.code));

  stores.forEach(s => {
    const opt = document.createElement('option');
    opt.value = 'store:' + s.code;
    opt.textContent = s.code + (s.print_name||s.brand ? ' · ' + (s.print_name||s.brand) : '');
    if (s.order_type === 'store-all')              selfOrder.appendChild(opt);
    else if (s.order_type === 'you-retail-store-bulk') bulkOrder.appendChild(opt);
    else if (s.order_type === 'store-bulk-only')   bulkOnly.appendChild(opt);
  });

  const otIcons  = { 'store-all':'🔑', 'you-retail-store-bulk':'🏪', 'store-bulk-only':'📦' };
  const otLabels = { 'store-all':'Self-order', 'you-retail-store-bulk':'Bulk ordering', 'store-bulk-only':'Bulk only' };
  const quickStores = [{ val:'admin', icon:'🔑', name:'Admin', sub:'Full access' }];
  ['store-all','you-retail-store-bulk','store-bulk-only'].forEach(ot => {
    const s = stores.find(x => x.order_type === ot);
    if (!s) return;
    quickStores.push({ val:'store:'+s.code, icon:otIcons[ot], name:s.print_name||s.brand||s.code, sub:otLabels[ot] });
  });
  quickGrid.innerHTML = quickStores.map(q => `
    <div class="qlogin" onclick="quickLogin('${q.val}','')">
      <div class="ql-icon">${q.icon}</div>
      <div class="ql-name">${q.name}</div>
      <div class="ql-sub">${q.sub}</div>
    </div>`).join('');
}

// ═══════════════════════════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════════════════════════

function saveOrdersToSession() {
  try { sessionStorage.setItem('pf_orders', JSON.stringify(orders)); } catch(e) {}
}

function restoreOrdersFromSession(code) {
  try {
    const stored = sessionStorage.getItem('pf_orders');
    if (!stored) return;
    const saved = JSON.parse(stored);
    // Only restore orders for this store
    Object.entries(saved).forEach(([key, val]) => {
      if (key.startsWith(code + ':')) orders[key] = val;
    });
  } catch(e) {}
}

function doLogin() {
  const pin = (document.getElementById('lc').value || '').trim();
  if (!pin) { toast('Enter your access code','err'); return; }
  if (!dataReady) { toast('Still loading — please wait a moment…',''); return; }

  // Check admin PIN first
  const adminPin = window._adminPin || '';
  if (adminPin && pin === adminPin) {
    quickLogin('admin', pin);
    return;
  }

  // Search all stores for matching PIN
  const match = Object.values(storeConfig).find(s => s.pin && s.pin === pin);
  if (match) {
    quickLogin('store:' + match.code, pin);
    return;
  }

  toast('Incorrect access code','err');
  document.getElementById('lc').value = '';
  document.getElementById('lc').focus();
}

function quickLogin(val, pin) {
  if (!dataReady) { toast('Still loading data — please wait a moment…',''); return; }
  if (val === 'admin') {
    const adminPin = window._adminPin || '';
    // Only enforce PIN if one has been set — allows open access until PIN is configured
    if (adminPin && pin !== adminPin) {
      toast('Incorrect admin PIN','err');
      document.getElementById('lc').value = '';
      document.getElementById('lc').focus();
      return;
    }
    USER = { role:'admin' };
  } else {
    const code = val.replace('store:','');
    const s    = storeConfig[code];

    // Check if store is active
    if (s && s.portal_active === false) {
      toast('This store does not have portal access — contact your rep','err');
      return;
    }

    // Validate PIN if one is set for this store
    const storedPin = s?.pin || '';
    if (storedPin && pin !== storedPin) {
      toast('Incorrect access code','err');
      document.getElementById('lc').value = '';
      document.getElementById('lc').focus();
      return;
    }

    // If no PIN is set yet, any input (including empty) passes
    // This lets stores log in before admin has set their PIN
    USER = { role:'store', code };
    // Fetch this store's forecast quantities after login (day sheets)
    if (SHEETS_URL) {
      document.getElementById('login').style.display = 'none';
      document.getElementById('app').style.display   = 'block';
      showLoadingScreen('Loading your order data…');
      fetch(SHEETS_URL + '?action=store_data&store=' + encodeURIComponent(code) + '&t=' + Date.now())
        .then(r => r.json())
        .then(json => {
          if (json.store) {
            const idx = window.STORES_RAW.findIndex(s => s.code === code);
            if (idx >= 0) window.STORES_RAW[idx] = { ...window.STORES_RAW[idx], ...json.store };
            initConfig();
          }
          restoreOrdersFromSession(code);
          hideLoadingScreen();
          bootApp();
        })
        .catch(() => { hideLoadingScreen(); bootApp(); });
      return;
    }
  }
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display   = 'block';
  bootApp();
}

function renderCurrentPage() {
  if (!activePage) return;
  if (activePage === 'orders')  renderOrders();
  if (activePage === 'admin')   renderAdmin();
  if (activePage === 'access')  renderStoreAccess();
  if (activePage === 'summary') renderSummary();
  if (activePage === 'weekmgr') renderWeekMgr();
}

function doLogout() {
  USER = null;
  document.getElementById('login').style.display = 'flex';
  document.getElementById('app').style.display   = 'none';
}

function bootApp() {
  // Avatar
  const av    = document.getElementById('uav');
  const lbl   = document.getElementById('ulbl');
  const isAdm = USER.role === 'admin';
  av.textContent  = isAdm ? 'AD' : USER.code.slice(0,3);
  av.style.background = isAdm ? 'var(--acc)' : 'var(--blu)';
  lbl.textContent = isAdm ? 'Admin' : USER.code;

  buildNav();
  if (isAdm) showPage('admin');
  else       showPage('orders');
}

// ═══════════════════════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════════════════════

function buildNav() {
  const nav = document.getElementById('nav');
  if (USER.role === 'admin') {
    nav.innerHTML = `
      <div class="nav-tab act" onclick="showPage('admin',this)">⚙ Store Settings</div>
      <div class="nav-tab" onclick="showPage('access',this)">🔐 Store Access</div>
      <div class="nav-tab" onclick="showPage('summary',this)">📋 Order Summary</div>
      <div class="nav-tab" onclick="showPage('weekmgr',this)">📅 Week Manager</div>`;
  } else {
    nav.innerHTML = `
      <div class="nav-tab act" onclick="showPage('orders',this)">📦 Place Order</div>`;
  }
}

function showPage(name, tabEl) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('act'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('act'));
  document.getElementById('page-' + name).classList.add('act');
  if (tabEl) tabEl.classList.add('act');
  else {
    const tabs = document.querySelectorAll('.nav-tab');
    tabs.forEach(t => { if (t.textContent.toLowerCase().includes(name.slice(0,4))) t.classList.add('act'); });
  }
  activePage = name;
  if (name === 'admin')   renderAdmin();
  if (name === 'orders')  renderOrders();
  if (name === 'access')  renderStoreAccess();
  if (name === 'summary') renderSummary();
  if (name === 'weekmgr') renderWeekMgr();
}

// ═══════════════════════════════════════════════════════════════
// ADMIN — STORE SETTINGS
// ═══════════════════════════════════════════════════════════════

function renderAdmin() {
  window._bulkSel = new Set();
  // Remove old select-all wrap so it gets recreated fresh
  const old = document.getElementById('adm-sel-all-wrap');
  if (old) old.remove();
  const el = document.getElementById('page-admin');
  const allStores = Object.values(storeConfig);
  const counts = {};
  Object.keys(ORDER_TYPES).forEach(k => counts[k] = 0);
  allStores.forEach(s => { if (counts[s.order_type] !== undefined) counts[s.order_type]++; });

  // Stats

      <select id="adm-bulk-ot" style="padding:4px 8px;border-radius:6px;border:1px solid var(--acc-b);background:var(--bg);font-size:12px;cursor:pointer;" onchange="admBulkSetOrderType(this.value);this.selectedIndex=0;">
        <option value="">Set order type…</option>

      <button class="btn btn-sm btn-ghost" onclick="openBulkSkuModal('add','bulk')">Add bulk SKUs…</button>

function renderAdminGrid() {
  const search = (document.getElementById('adm-search')?.value||'').toLowerCase();
  const ot     = document.getElementById('adm-ot')?.value    || '';
  const region = document.getElementById('adm-region')?.value|| '';
  const brand  = document.getElementById('adm-brand')?.value || '';

  const filtered = Object.values(storeConfig).filter(s => {
    if (search && !s.code.toLowerCase().includes(search) && !s.brand.toLowerCase().includes(search)) return false;
    if (ot     && s.order_type !== ot)     return false;
    if (region && s.region     !== region) return false;
    if (brand  && s.brand      !== brand)  return false;
    return true;
  });

  const grid = document.getElementById('adm-grid');
  if (!filtered.length) { grid.innerHTML = '<div class="empty">No stores match</div>'; return; }

  const prefix = code => code.split('-')[0];
  const pillClass = code => {
    const p = prefix(code);
    return ['WFM','GEL','USC','BFM','ERT'].includes(p) ? `pill-${p}` : 'pill-def';
  };

  // Add select-all checkbox before grid if not present
  const existingSelAll = document.getElementById('adm-sel-all-wrap');
  if (!existingSelAll) {
    const wrap = document.createElement('div');
    wrap.id = 'adm-sel-all-wrap';
    wrap.style.cssText = 'margin-bottom:8px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink3);';
    wrap.innerHTML = '<label style="display:flex;align-items:center;gap:6px;cursor:pointer;"><input type="checkbox" id="adm-sel-all" onchange="admToggleSelectAll(this.checked)"> Select all visible</label>';
    grid.parentNode.insertBefore(wrap, grid);
  }

  grid.innerHTML = filtered.map(s => {
    const ot = ORDER_TYPES[s.order_type] || ORDER_TYPES['you-all'];
    const isSel = adminSelectedStore === s.code;
    const isBulkSel = window._bulkSel && window._bulkSel.has(s.code);
    const skuCount = (s.retail_skus||[]).length + (s.bulk_skus||[]).length;
    const isActive = s.portal_active !== false;
    return `<div class="scard${isSel?' sel':''}${isBulkSel?' bulk-sel':''}${!isActive?' inactive-store':''}"
      onclick="admCardClick(event,'${s.code}')"
      style="${!isActive?'opacity:.5;':''}${isBulkSel?'outline:2px solid var(--acc);outline-offset:2px;':''}">
      <div style="position:absolute;top:8px;left:8px;z-index:2;">
        <input type="checkbox" ${isBulkSel?'checked':''} onclick="event.stopPropagation();admToggleOne('${s.code}',this.checked)" style="cursor:pointer;">
      </div>
      <div class="sc-top" style="padding-left:20px;">
        <div>
          <div class="sc-code">${s.code}</div>
          <div class="sc-brand">${s.brand||'—'}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;">
          <button onclick="event.stopPropagation();toggleStoreActive('${s.code}')"
            style="font-size:9px;font-family:'IBM Plex Mono',monospace;padding:2px 7px;border-radius:10px;border:1px solid ${isActive?'var(--grn-b)':'var(--bdr2)'};background:${isActive?'var(--grn-l)':'var(--surf2)'};color:${isActive?'var(--grn)':'var(--ink3)'};cursor:pointer;font-weight:700;">
            ${isActive?'● ACTIVE':'○ INACTIVE'}
          </button>
          <span class="ot-pill ot-${s.order_type}">${ot.label}</span>
        </div>
      </div>
      <div class="sc-bottom">
        <span class="pill ${pillClass(s.code)}">${prefix(s.code)}</span>
        <span class="pill ${s.region==='NORCAL'?'pill-NORCAL':'pill-SOCAL'}">${s.region||'—'}</span>
        ${skuCount ? `<span class="pill pill-def">${skuCount} SKUs</span>` : ''}
        ${s.revenue ? `<span class="pill pill-def">$${s.revenue.toFixed(0)}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

function admCardClick(e, code) {
  // If clicking the checkbox area don't open detail
  if (e.target.type === 'checkbox') return;
  if (e.ctrlKey || e.metaKey || e.shiftKey) {
    admToggleOne(code, !window._bulkSel?.has(code));
    renderAdminGrid();
  } else {
    selectAdminStore(code);
  }
}

function selectAdminStore(code) {
  adminSelectedStore = code;
  renderAdminGrid();
  renderAdminDetail(code);
  const detail = document.getElementById('adm-detail');
  if (detail) detail.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function admToggleOne(code, checked) {
  if (!window._bulkSel) window._bulkSel = new Set();
  checked ? window._bulkSel.add(code) : window._bulkSel.delete(code);
  updateAdmBulkBar();
  // sync select-all checkbox
  const cbs = document.querySelectorAll('#adm-grid input[type=checkbox]');
  const selAll = document.getElementById('adm-sel-all');
  if (selAll) selAll.checked = cbs.length > 0 && [...cbs].every(c => c.checked);
}

function admToggleSelectAll(checked) {
  if (!window._bulkSel) window._bulkSel = new Set();
  document.querySelectorAll('#adm-grid input[type=checkbox]').forEach(cb => {
    cb.checked = checked;
    // extract code from the card's onclick
    const card = cb.closest('.scard');
    if (card) {
      const match = card.getAttribute('onclick')?.match(/'([^']+)'/);
      if (match) checked ? window._bulkSel.add(match[1]) : window._bulkSel.delete(match[1]);
    }
  });
  updateAdmBulkBar();
}

function updateAdmBulkBar() {
  const bar = document.getElementById('adm-bulk-bar');
  const lbl = document.getElementById('adm-bulk-count');
  const n   = window._bulkSel ? window._bulkSel.size : 0;
  if (bar) { bar.style.display = n > 0 ? 'flex' : 'none'; bar.style.pointerEvents = n > 0 ? 'auto' : 'none'; }
  if (lbl) lbl.textContent = n + ' store' + (n===1?'':'s') + ' selected';
}

function clearAdmBulkSel() {
  window._bulkSel = new Set();
  updateAdmBulkBar();
  renderAdminGrid();
}

function admBulkSetOrderType(ot) {
  if (!ot || !window._bulkSel || !window._bulkSel.size) return;
  const codes = [...window._bulkSel].filter(c => storeConfig[c]);
  codes.forEach(code => {
    storeConfig[code].order_type = ot;
    window._pendingChanges.add(code);
  });
  renderAdminGrid();
  updatePendingBar();
  toast(codes.length + ' stores staged — hit Save to confirm', '');
}

          <div class="ot-grid">

              <div class="ot-opt${s.order_type===k?' sel':''}" onclick="setOrderType('${code}','${k}')">

            <span style="display:flex;gap:6px;">
              <button class="btn btn-ghost btn-sm" onclick="toggleAllSkus('${code}','retail',true)">All on</button>
              <button class="btn btn-ghost btn-sm" onclick="toggleAllSkus('${code}','retail',false)">All off</button>
            </span>
          </div>
          <div class="sku-list">

                <div class="sku-tog">${on?'✓':''}</div>
                <div class="sku-code">${sku}</div>
                <div class="sku-name">${info.name||sku}</div>
                <span class="sku-cat" style="background:${CAT_COLOR[info.cat]||'#eee'}22;color:${CAT_COLOR[info.cat]||'#888'};font-size:7px;padding:1px 4px;border-radius:2px;">${info.cat}</span>

function previewText(code) {
  const s  = storeConfig[code];
  const ot = s.order_type;
  const rc = (s.retail_skus||[]).length;
  const bc = (s.bulk_skus||[]).length;

  if (ot === 'you-all')
    return `🔒 <strong>${code} cannot log in.</strong><br>You forecast everything for this store. They have no portal access.`;
  if (ot === 'store-all')
    return `✅ <strong>${code} sees all ${rc} retail + ${bc} bulk SKUs.</strong><br>They can adjust and submit everything.`;
  if (ot === 'you-retail-store-bulk')
    return `🔒 <strong>${rc} retail SKUs locked</strong> (you forecast those).<br>✅ <strong>${bc} bulk SKUs editable</strong> by the store.`;
  if (ot === 'store-bulk-only')
    return `✅ <strong>${bc} bulk SKUs only</strong> — retail section hidden entirely.`;
  return '—';
}

function w10ActualsHTML(code) {
  const s = storeConfig[code];
  // Aggregate all quantities across all delivery days
  const allQtys = {};
  Object.values(s.days||{}).forEach(dayQtys => {
    Object.entries(dayQtys).forEach(([sku,q]) => { allQtys[sku] = (allQtys[sku]||0) + q; });
  });
  const entries = Object.entries(allQtys).filter(([,q])=>q>0);
  if (!entries.length) return '<div style="color:var(--ink3);font-size:12px;">No orders this week for this store</div>';
  return `<div style="display:flex;flex-direction:column;gap:4px;">
    ${entries.map(([sku,qty])=>{
      const info = SKUS_RAW[sku]||{};
      const isBulk = info.is_bulk;
      return `<div style="display:flex;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px solid var(--bdr);">
        <span style="font-family:'IBM Plex Mono',monospace;color:${isBulk?'var(--blu)':'var(--ink3)'};">${sku}</span>
        <span style="color:var(--ink2);flex:1;padding:0 8px;">${info.name||sku}</span>
        <span style="font-weight:700;">${qty}</span>
      </div>`;
    }).join('')}
  </div>`;
}


function defaultOrderType(code, brand) {
  const cu = (code||'').toUpperCase();
  if (cu.startsWith('WFM-')) return 'you-all';
  if (["GELSON'S","BRISTOL FARMS"].includes((brand||'').toUpperCase())) return 'you-retail-store-bulk';
  return 'you-all';
}

// ── Pending changes system ────────────────────────────────────
window._pendingChanges = new Set(); // store codes with unsaved changes

function saveAdminConfig(code) {
  // Stage the change locally — don't write yet
  window._pendingChanges.add(code);
  updatePendingBar();
}

function updatePendingBar() {
  const bar = document.getElementById('pending-bar');
  const lbl = document.getElementById('pending-count');
  const n   = window._pendingChanges.size;
  if (bar) { bar.style.display = n > 0 ? 'flex' : 'none'; bar.style.pointerEvents = n > 0 ? 'auto' : 'none'; }
  if (lbl) lbl.textContent   = n + ' unsaved change' + (n===1?'':'s');
}

function savePendingChanges() {
  const codes = [...window._pendingChanges];
  if (!codes.length) return;
  const bar = document.getElementById('pending-bar');
  const lbl = document.getElementById('pending-count');
  if (lbl) lbl.textContent = 'Saving…';
  // Timeout fallback — if callback never fires, clear bar after 30s
  const fallback = setTimeout(() => {
    window._pendingChanges = new Set();
    if (bar) bar.style.display = 'none';
    toast('Saved ' + codes.length + ' store' + (codes.length===1?'':'s') + ' ✓', 'ok');
  }, 30000);
  saveBulkConfigs(codes, () => {
    clearTimeout(fallback);
    window._pendingChanges = new Set();
    if (bar) bar.style.display = 'none';
    toast('Saved ' + codes.length + ' store' + (codes.length===1?'':'s') + ' ✓', 'ok');
  });
}

function discardPendingChanges() {
  if (!window._pendingChanges.size) return;
  // Reload live data to reset any staged changes
  window._pendingChanges = new Set();
  updatePendingBar();
  // Re-fetch from server to restore actual state
  if (SHEETS_URL) {
    fetch(SHEETS_URL + '?action=boot_data&t=' + Date.now())
      .then(r => r.json())
      .then(json => {
        if (json.stores) { window.STORES_RAW = json.stores; initConfig(); }
        if (json.skus)   window.SKUS_RAW = json.skus;
        renderAdmin();
        renderStoreAccess();
        toast('Changes discarded', '');
      })
      .catch(() => toast('Changes discarded (reload to confirm)', ''));
  }
}

function writeAdminConfigNow(code) {
  // Direct write for single-store actions like PIN set — bypasses pending system
  if (!SHEETS_URL) return;
  const s  = storeConfig[code];
  const ot = s.order_type || defaultOrderType(code, s.brand || '');
  const payload = encodeURIComponent(JSON.stringify({
    store: code, order_type: ot,
    retail_skus: s.retail_skus || [], bulk_skus: s.bulk_skus || [],
    portal_active: s.portal_active !== false, pin: s.pin || '',
  }));
  const cbName = 'pfc_cfg_' + Date.now();
  const script = document.createElement('script');
  window[cbName] = function() { delete window[cbName]; if(script.parentNode) script.parentNode.removeChild(script); };
  script.src = SHEETS_URL + '?action=save_config&callback=' + cbName + '&payload=' + payload;
  document.head.appendChild(script);
}

// ── Single bulk save — sends all stores in one API call ─────
function saveBulkConfigs(codes, onDone) {
  if (!codes.length) { if (onDone) onDone(); return; }
  if (!SHEETS_URL) return;

  const payloads = codes
    .filter(c => storeConfig[c])
    .map(c => {
      const s  = storeConfig[c];
      const ot = s.order_type || defaultOrderType(c, s.brand || '');
      return {
        store:         c,
        order_type:    ot,
        retail_skus:   s.retail_skus || [],
        bulk_skus:     s.bulk_skus   || [],
        portal_active: s.portal_active !== false,
        pin:           s.pin || '',
      };
    });

  // Chunk into batches of 5 to stay under URL length limit
  const CHUNK = 5;
  const chunks = [];
  for (let i = 0; i < payloads.length; i += CHUNK) chunks.push(payloads.slice(i, i + CHUNK));

  let idx = 0;
  const total = chunks.length;

  function sendChunk() {
    if (idx >= total) { if (onDone) onDone(); return; }
    const batch  = chunks[idx++];
    const cbName = 'pfc_bulk_' + Date.now() + '_' + idx;
    const script = document.createElement('script');

    const fallback = setTimeout(() => {
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
      sendChunk();
    }, 20000);

    window[cbName] = function() {
      clearTimeout(fallback);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
      sendChunk();
    };

    script.src = SHEETS_URL + '?action=bulk_save_config&callback=' + cbName +
      '&payloads=' + encodeURIComponent(JSON.stringify(batch));
    document.head.appendChild(script);

    const lbl = document.getElementById('pending-count');
    if (lbl && total > 1) lbl.textContent = 'Saving batch ' + idx + ' of ' + total + '…';
  }

  sendChunk();
}

function setOrderType(code, ot) {
  storeConfig[code].order_type = ot;
  window._pendingChanges.add(code);
  const pageScrollY = window.scrollY;
  renderAdminDetail(code);
  renderAdminGrid();
  window.scrollTo(0, pageScrollY);
  updatePendingBar();
  toast(code + ' → ' + ORDER_TYPES[ot].label + ' (unsaved)', '');
}

function toggleStoreActive(code) {
  const current = storeConfig[code].portal_active !== false;
  storeConfig[code].portal_active = !current;
  window._pendingChanges.add(code);
  updatePendingBar();
  const pageScrollY = window.scrollY;
  renderAdminGrid();
  if (adminSelectedStore === code) renderAdminDetail(code);
  window.scrollTo(0, pageScrollY);
  toast(`${code} → ${!current ? 'Active' : 'Inactive'}`,'ok');
  saveAdminConfig(code);
}

function toggleSku(code, type, sku) {
  const arr = type === 'retail' ? storeConfig[code].retail_skus : storeConfig[code].bulk_skus;
  const idx = arr.indexOf(sku);
  if (idx >= 0) arr.splice(idx,1);
  else arr.push(sku);

  // Save scroll positions before re-render
  const pageScrollY = window.scrollY;
  const retailList = document.querySelector('#adm-detail .sku-list');
  const bulkLists  = document.querySelectorAll('#adm-detail .sku-list');
  const retailScroll = bulkLists[0] ? bulkLists[0].scrollTop : 0;
  const bulkScroll   = bulkLists[1] ? bulkLists[1].scrollTop : 0;

  renderAdminDetail(code);

  // Restore scroll positions after re-render
  window.scrollTo(0, pageScrollY);
  const newLists = document.querySelectorAll('#adm-detail .sku-list');
  if (newLists[0]) newLists[0].scrollTop = retailScroll;
  if (newLists[1]) newLists[1].scrollTop = bulkScroll;

  saveAdminConfig(code);
}

function toggleAllSkus(code, type, on) {
  if (type === 'retail') {
    storeConfig[code].retail_skus = on ? Object.keys(SKUS_RAW).filter(k=>!SKUS_RAW[k].is_bulk) : [];
  } else {
    storeConfig[code].bulk_skus = on ? Object.keys(SKUS_RAW).filter(k=>SKUS_RAW[k].is_bulk) : [];
  }
  const pageScrollY = window.scrollY;
  renderAdminDetail(code);
  window.scrollTo(0, pageScrollY);
  saveAdminConfig(code);
}

// ═══════════════════════════════════════════════════════════════

let orderQtys = {};

function renderOrders() {
  const code = USER.code;
  const s    = storeConfig[code];
  if (!s) { document.getElementById('page-orders').innerHTML = '<div class="empty">Store not found — contact your rep.</div>'; return; }

  const ot  = s.order_type;
  const canEditRetail = ot === 'store-all';
  const canEditBulk   = ['store-all','you-retail-store-bulk','store-bulk-only'].includes(ot);

  // Get delivery days for this store
  // Sort delivery days by actual upcoming date (soonest first)
  // getDayDate handles +7 for locked days, so locked days naturally sort later
  const deliveryDays = Object.keys(s.days||{}).sort((a,b) => {
    const getDateVal = day => {
      const str   = getDayDate(day); // e.g. "FRI 4/10" or "TUE 4/14"
      const match = str.match(/(\d+)\/(\d+)/);
      if (!match) return 0;
      return new Date(2026, parseInt(match[1])-1, parseInt(match[2])).getTime();
    };
    return getDateVal(a) - getDateVal(b);
  });

  if (!deliveryDays.length) {
    document.getElementById('page-orders').innerHTML = '<div class="empty">No delivery days configured for this store.</div>';
    return;
  }

  // Pre-fill qty state per day — use DELIVERY day's quantities, not the order day's
  // e.g. ordering on MON for THU delivery → pre-fill from s.days['THU']
  const ORDER_TO_DELIVERY = { MON:'THU', TUE:'FRI', WED:'SAT', THU:'MON', FRI:'TUE', SAT:'WED' };
  if (!orderQtys[code]) orderQtys[code] = {};
  deliveryDays.forEach(day => {
    if (!orderQtys[code][day]) {
      const deliveryDay = ORDER_TO_DELIVERY[day] || day;
      orderQtys[code][day] = {...(s.days[deliveryDay] || s.days[day] || {})};
    }
  });

  const activeDay = window._activeDay?.[code] || deliveryDays[0];
  if (!window._activeDay) window._activeDay = {};
  window._activeDay[code] = activeDay;

  const allSubmitted = deliveryDays.every(d => orders[`${code}:${WEEK}:${d}`]?.status === 'submitted');

  const el = document.getElementById('page-orders');
  el.innerHTML = `
    <div class="phdr" style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;">
      <div>
        <div class="ptitle">${code}</div>
        <div class="psub">${s.brand||''} · ${s.region||''} · W${WEEK} · Pre-filled from last week</div>
      </div>
      <div style="background:var(--surf);border:1px solid var(--bdr);border-radius:8px;padding:10px 14px;text-align:right;">
        <div style="font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--ink3);text-transform:uppercase;">Ordering for</div>
        <div style="font-size:17px;font-weight:900;color:var(--blu);">Week ${WEEK}</div>
        <div style="font-size:10px;color:var(--ink3);">${deliveryDays.length} delivery day${deliveryDays.length>1?'s':''}</div>
      </div>
    </div>

    <div class="alert ${allSubmitted?'alert-grn':'alert-blu'}">
      <div class="alert-dot"></div>
      <div>${allSubmitted
        ? '<strong>All days submitted ✓</strong> Contact your rep to make changes.'
        : 'Review quantities for each delivery day and submit. Greyed sections are managed by your rep.'
      }</div>
    </div>

    <!-- Day tabs -->
    <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;">
      ${deliveryDays.map(d => {
        const dayKey = `${code}:${WEEK}:${d}`;
        const st = orders[dayKey]?.status;
        const isActive = d === activeDay;
        const cutoffLocked = isDayLocked(d);
        // Check if this day is showing next week's date (future order)
        const isFutureWeek = cutoffLocked;
        const color = st==='submitted'?'var(--grn)': isFutureWeek?'var(--pur)': st==='draft'?'var(--yel)':'var(--ink3)';
        const indicator = st==='submitted'?'✓': isFutureWeek?'W'+(WEEK+1): st==='draft'?'…':'—';
        return `<button onclick="switchDay('${code}','${d}')" style="padding:7px 14px;border-radius:7px;border:2px solid ${isActive?'var(--acc)':'var(--bdr)'};background:${isActive?'var(--acc-l)':'var(--surf)'};font-weight:800;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;">
          ${getDayDate(d)}
          <span style="font-size:9px;font-family:'IBM Plex Mono',monospace;color:${color};">${indicator}</span>
        </button>`;
      }).join('')}
    </div>

    <div id="order-form"></div>

    <div class="card" style="margin-bottom:10px;padding:13px 16px;display:flex;flex-direction:column;gap:10px;">
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="font-size:12px;font-weight:700;white-space:nowrap;">PO Number</div>
        <input type="text" id="order-po"
          placeholder="Enter PO number (optional)"
          value="${orders[`${code}:${WEEK}:${activeDay}`]?.po_number||''}"
          style="flex:1;padding:6px 10px;background:var(--surf2);border:1px solid var(--bdr);border-radius:5px;font-family:'IBM Plex Mono',monospace;font-size:12px;outline:none;">
      </div>
      <div>
        <div style="font-size:12px;font-weight:700;margin-bottom:6px;">Notes for ${activeDay}</div>
        <textarea style="width:100%;padding:8px 10px;background:var(--surf2);border:1px solid var(--bdr);border-radius:5px;font-family:'Epilogue',sans-serif;font-size:13px;resize:vertical;min-height:44px;outline:none;" id="order-notes" placeholder="Delivery notes…">${orders[`${code}:${WEEK}:${activeDay}`]?.notes||''}</textarea>
      </div>
    </div>

    <div class="order-footer">
      <div class="of-totals">
        <div><div class="of-lbl">Units (${activeDay})</div><div class="of-val" id="of-units">0</div></div>
        <div><div class="of-lbl">Est. Value</div><div class="of-val" id="of-val">$0</div></div>
      </div>
      <div style="display:flex;gap:7px;">
        <button class="btn btn-ghost" onclick="saveDraft('${code}','${activeDay}')">Save Draft</button>
        <button class="btn btn-grn" id="submit-btn"
          onclick="submitOrder('${code}','${activeDay}')"
          ${orders[`${code}:${WEEK}:${activeDay}`]?.status==='submitted'?'disabled':''}>
          ${orders[`${code}:${WEEK}:${activeDay}`]?.status==='submitted'?'✓ Submitted': isDayLocked(activeDay)?'Submit ' + getDayDate(activeDay) + ' (W'+(WEEK+1)+') →':'Submit ' + getDayDate(activeDay) + ' →'}
        </button>
      </div>
    </div>`;

  buildOrderFormDay(code, activeDay, canEditRetail, canEditBulk, isDayLocked(activeDay));
  updateOrderFooter(code, canEditRetail, canEditBulk, activeDay);
}

function switchDay(code, day) {
  if (!window._activeDay) window._activeDay = {};
  window._activeDay[code] = day;
  renderOrders();
}

function buildOrderFormDay(code, day, canEditRetail, canEditBulk, cutoffLocked) {
  const s      = storeConfig[code];
  // Pull reference quantities from the DELIVERY day (e.g. ordering MON → read THU's data)
  const ORDER_TO_DELIVERY_LOCAL = { MON:'THU', TUE:'FRI', WED:'SAT', THU:'MON', FRI:'TUE', SAT:'WED' };
  const deliveryKey = ORDER_TO_DELIVERY_LOCAL[day] || day;
  const dayQtys = (s.days||{})[deliveryKey] || (s.days||{})[day] || {};
  const submitted = orders[`${code}:${WEEK}:${day}`]?.status === 'submitted';
  const isLocked = submitted || !!cutoffLocked;

  // Get SKUs that appear on this day
  const dayRetail = (s.retail_skus||[]).filter(sku => dayQtys[sku] !== undefined || (s.retail_skus||[]).includes(sku));
  const dayBulk   = (s.bulk_skus||[]).filter(sku => dayQtys[sku] !== undefined || (s.bulk_skus||[]).includes(sku));

  // Only show SKUs that have a W10 quantity on this day OR that are in store's catalog
  const showRetail = (s.retail_skus||[]).filter(sku => dayQtys[sku] > 0 || (orderQtys[code]?.[day]?.[sku]||0) > 0);
  const showBulk   = (s.bulk_skus||[]).filter(sku => dayQtys[sku] > 0 || (orderQtys[code]?.[day]?.[sku]||0) > 0);

  // Also include all store SKUs even if 0 (so they can add)
  const retailSet = new Set([...showRetail, ...(s.retail_skus||[])]);
  const bulkSet   = new Set([...showBulk,   ...(s.bulk_skus||[])]);

  const el = document.getElementById('order-form');
  let html = '';

  if (s.order_type !== 'store-bulk-only' && retailSet.size) {
    html += buildSectionDay('Retail Items', [...retailSet], canEditRetail, code, day, false, isLocked);
  }
  if (bulkSet.size) {
    html += buildSectionDay('Bulk Items', [...bulkSet], canEditBulk, code, day, true, isLocked);
  }

  el.innerHTML = html || '<div class="empty">No SKUs for this delivery day.</div>';
}

function buildSectionDay(title, skus, canEdit, code, day, isBulk, isSubmitted) {
  const qtys   = orderQtys[code]?.[day] || {};
  const s      = storeConfig[code];
  const ORDER_TO_DELIVERY_SEC = { MON:'THU', TUE:'FRI', WED:'SAT', THU:'MON', FRI:'TUE', SAT:'WED' };
  const deliveryKey = ORDER_TO_DELIVERY_SEC[day] || day;
  const w10day = (s.days||{})[deliveryKey] || (s.days||{})[day] || {};
  const locked = !canEdit || isSubmitted;
  const dotColor = isBulk ? 'var(--blu)' : 'var(--grn)';

  const items = skus.map(sku => {
    const info  = SKUS_RAW[sku] || {};
    const w10q  = w10day[sku] || 0;
    const q     = qtys[sku] ?? w10q;
    return { sku, info, w10q, q, changed: q !== w10q };
  }).filter(item => item.w10q > 0 || !locked); // hide zero-qty locked rows

  if (!items.length) return '';

  return `<div class="order-sect">
    <div class="order-sect-hdr">
      <div class="order-sect-title">
        <div style="width:7px;height:7px;border-radius:50%;background:${dotColor};flex-shrink:0;"></div>
        ${title} <span style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--ink3);">${items.length} items</span>
      </div>
      ${locked && !isSubmitted ? '<div class="order-sect-locked">🔒 Managed by your rep</div>' : ''}
    </div>
    ${items.map(({sku,info,w10q,q,changed})=>`
      <div class="orow${changed&&!locked?' changed':''}" id="orow-${day}-${sku}" style="${locked?'opacity:.5;pointer-events:none;':''}" >
        <div class="orow-sku">${sku}</div>
        <div>
          <div class="orow-name">${info.name||sku}</div>
          <div class="orow-prev">Last: ${w10q||'—'}</div>
        </div>
        <div class="orow-price"><div style="font-size:9px;color:var(--ink3);">${info.subcat||info.cat||''}</div><div style="font-weight:700;">$${getPrice(code,sku).toFixed(2)}</div></div>
        <div class="qctl">
          <button class="qbtn" onclick="adjQDay('${code}','${day}','${sku}',-1)">−</button>
          <input class="qinp" type="number" min="0" id="q-${day}-${sku}" value="${q}" onchange="setQDay('${code}','${day}','${sku}',this.value)">
          <button class="qbtn" onclick="adjQDay('${code}','${day}','${sku}',1)">+</button>
        </div>
        <div class="orow-total" id="ot-${day}-${sku}">${q>0?'$'+(q*getPrice(code,sku)).toFixed(2):'—'}</div>
      </div>`).join('')}
  </div>`;
}

function adjQDay(code,day,sku,d){ setQDay(code,day,sku,(orderQtys[code]?.[day]?.[sku]||0)+d); }
function setQDay(code,day,sku,v){
  const q = Math.max(0,parseInt(v)||0);
  if(!orderQtys[code]) orderQtys[code]={};
  if(!orderQtys[code][day]) orderQtys[code][day]={};
  orderQtys[code][day][sku]=q;
  const inp=document.getElementById(`q-${day}-${sku}`); if(inp) inp.value=q;
  const tot=document.getElementById(`ot-${day}-${sku}`); if(tot) tot.textContent=q>0?'$'+(q*getPrice(code,sku)).toFixed(2):'—';
  const w10q=(storeConfig[code]?.days?.[day]||{})[sku]||0;
  const row=document.getElementById(`orow-${day}-${sku}`);
  if(row && !row.style.pointerEvents) row.classList.toggle('changed',q!==w10q);
  const ot=storeConfig[code]?.order_type;
  updateOrderFooter(code,['store-all'].includes(ot),['store-all','you-retail-store-bulk','store-bulk-only'].includes(ot),day);
}

function getPrice(code, sku) {
  const priceKey = storeConfig[code]?.price_key || 'DIRECT';
  const prices   = SKUS_RAW[sku]?.prices || {};
  return prices[priceKey] || prices['DIRECT'] || 0;
}

function updateOrderFooter(code, canEditRetail, canEditBulk, day) {
  const qtys = day ? (orderQtys[code]?.[day]||{}) : (orderQtys[code]||{});
  let units=0, val=0;
  Object.entries(qtys).forEach(([sku,q])=>{
    if(!q) return;
    const isBulk = !!SKUS_RAW[sku]?.is_bulk;
    if((isBulk && canEditBulk)||(!isBulk && canEditRetail)) units+=q;
    val += q * getPrice(code, sku);
  });
  const eu=document.getElementById('of-units'), ev=document.getElementById('of-val');
  if(eu) eu.textContent=units; if(ev) ev.textContent='$'+val.toFixed(2);
}

function saveDraft(code, day) {
  const key = `${code}:${WEEK}:${day}`;
  const draftPoInput = (document.getElementById('order-po')?.value||'').trim();
  const draftPoExisting = orders[key]?.po_number || '';
  const draftPo = draftPoInput || draftPoExisting; // only overwrite if store entered something
  orders[key] = { qtys:{...orderQtys[code]?.[day]}, status:'draft', notes:document.getElementById('order-notes')?.value||'', po_number:draftPo, submittedAt:'' };
  toast(`Draft saved for ${day}`,'ok');
}

function submitOrder(code, day) {
  const ot      = storeConfig[code]?.order_type;
  const dayQtys = orderQtys[code]?.[day] || {};

  // Filter to only SKUs the store can actually edit
  const canEditBulk   = ['store-all','you-retail-store-bulk','store-bulk-only'].includes(ot);
  const canEditRetail = ot === 'store-all';

  const editable = Object.entries(dayQtys).filter(([sku, q]) => {
    if (!q) return false;
    const isBulk = !!SKUS_RAW[sku]?.is_bulk;
    // For store-bulk-only, treat all SKUs in their list as editable
    // (they only see bulk SKUs anyway)
    if (ot === 'store-bulk-only') return true;
    if (isBulk)  return canEditBulk;
    return canEditRetail;
  });
  const total = editable.reduce((s,[,q])=>s+q,0);
  if(!total) { toast('Add at least 1 unit','err'); return; }

  const key = `${code}:${WEEK}:${day}`;
  const submittedAt = new Date().toLocaleString();
  const submitPoInput = (document.getElementById('order-po')?.value||'').trim();
  const submitPoExisting = orders[key]?.po_number || '';
  const submitPo = submitPoInput || submitPoExisting; // only overwrite if store entered something
  orders[key] = { qtys:{...dayQtys}, status:'submitted', notes:document.getElementById('order-notes')?.value||'', po_number:submitPo, submittedAt };
  saveOrdersToSession();
  toast(`${day} order submitted — ${total} units ✓`,'ok');

  // Sync to sheet
  if(SHEETS_URL) {
    const nextWeekDays = ['THU','FRI','SAT'];
    const orderWeek = nextWeekDays.includes(day) ? WEEK : WEEK - 1;
    const deliveryDayName = getDayDate(day).split(' ')[0];
    const poNumber = orders[`${code}:${WEEK}:${day}`]?.po_number || '';
    const orderData = { action:'write_order', store:code, week:orderWeek, day, deliveryDay:deliveryDayName, qtys:dayQtys, status:'submitted', submittedAt, po_number:poNumber };

    // Check URL length — if too long, chunk qtys into multiple calls
    const fullPayload = encodeURIComponent(JSON.stringify(orderData));
    const BASE_URL = SHEETS_URL + '?action=write_order&callback=X&payload=';

    if ((BASE_URL + fullPayload).length < 2000) {
      // Short enough — single JSONP call
      const cbName = 'pfc_write_' + Date.now();
      const script = document.createElement('script');
      window[cbName] = function() { delete window[cbName]; if(script.parentNode) script.parentNode.removeChild(script); };
      script.src = SHEETS_URL + '?action=write_order&callback=' + cbName + '&payload=' + fullPayload;
      document.head.appendChild(script);
    } else {
      // Too long — split qtys into chunks and send sequentially
      const qtyEntries = Object.entries(dayQtys).filter(([,q]) => q > 0);
      const CHUNK = 10;
      const chunks = [];
      for (let i = 0; i < qtyEntries.length; i += CHUNK) chunks.push(qtyEntries.slice(i, i + CHUNK));
      let idx = 0;
      function sendChunk() {
        if (idx >= chunks.length) return;
        const batch = Object.fromEntries(chunks[idx++]);
        const chunkData = { ...orderData, qtys: batch, _chunk: idx, _total: chunks.length };
        const cbName = 'pfc_write_' + Date.now() + '_' + idx;
        const script = document.createElement('script');
        const timeout = setTimeout(() => { delete window[cbName]; if(script.parentNode) script.parentNode.removeChild(script); sendChunk(); }, 15000);
        window[cbName] = function() { clearTimeout(timeout); delete window[cbName]; if(script.parentNode) script.parentNode.removeChild(script); sendChunk(); };
        script.src = SHEETS_URL + '?action=write_order&callback=' + cbName + '&payload=' + encodeURIComponent(JSON.stringify(chunkData));
        document.head.appendChild(script);
      }
      sendChunk();
    }
  }
  renderOrders();
}

function saveAdminPin() {
  if (!MASTER_URL) { toast('No master URL configured','err'); return; }
  const inp = document.getElementById('admin-pin-inp');
  const pin = inp ? inp.value.trim() : '';
  if (!pin) { toast('Enter a PIN first','err'); return; }

  const cbName = 'pfc_adminpin_' + Date.now();
  const script = document.createElement('script');
  window[cbName] = function(result) {
    delete window[cbName];
    if (script.parentNode) script.parentNode.removeChild(script);
    if (result && result.ok) {
      window._adminPin = pin;
      if (inp) inp.value = '';
      const status = document.getElementById('admin-pin-status');
      if (status) { status.textContent = '✓ PIN updated'; status.style.color = 'var(--grn)'; }
      toast('Admin PIN updated ✓','ok');
      setTimeout(() => renderWeekMgr(), 1000);
    } else {
      toast('Failed to save PIN — ' + (result?.error || 'unknown error'),'err');
    }
  };
  const payload = encodeURIComponent(JSON.stringify({ pin }));
  script.src = MASTER_URL + '?action=set_admin_pin&callback=' + cbName + '&payload=' + payload;
  document.head.appendChild(script);
}

function saveCutoff(day, value) {
  const saved = JSON.parse(localStorage.getItem('pfc_cutoffs') || '{}');
  saved[day] = value;
  localStorage.setItem('pfc_cutoffs', JSON.stringify(saved));
  const el = document.getElementById(`cutoff-status-${day}`);
  if (el) { el.textContent = '✓ saved'; el.style.color = 'var(--grn)'; setTimeout(() => { el.textContent = 'saved'; el.style.color = 'var(--ink3)'; }, 1500); }
}

function resetCutoffs() {
  localStorage.removeItem('pfc_cutoffs');
  renderWeekMgr();
  toast('Cutoffs reset to defaults');
}

function isDayLocked(orderDay) {
  const saved = JSON.parse(localStorage.getItem('pfc_cutoffs') || '{}');

  // Default cutoffs per delivery day.
  // MON/TUE/WED deliveries: cutoff is PREVIOUS week (Thu/Fri/Sat before the week starts)
  // THU/FRI/SAT deliveries: cutoff is SAME week (Mon/Tue/Wed)
  const defaults = {
    MON: { day:'THU', time:'5:00 PM', prevWeek:true  },
    TUE: { day:'FRI', time:'5:00 PM', prevWeek:true  },
    WED: { day:'SAT', time:'12:00 PM', prevWeek:true },
    THU: { day:'MON', time:'5:00 PM', prevWeek:false },
    FRI: { day:'TUE', time:'5:00 PM', prevWeek:false },
    SAT: { day:'WED', time:'5:00 PM', prevWeek:false },
  };

  // Allow admin override via localStorage (stored as "DAY HH:MM AM/PM [prev]")
  // If no override, use defaults above
  const override   = saved[orderDay];
  let cutoffDayName, cutoffTime, isPrevWeek;

  if (override) {
    // Parse saved override format: "FRI 5:00 PM", "FRI 5:00 PM prev", or "FRI 5:00 PM (prev week)"
    const parts = override.match(/^(\w{3})\s+(\d+:\d+\s*(?:AM|PM))(?:\s+(?:prev|\(prev\s*week\)))?$/i);
    if (!parts) return false;
    cutoffDayName = parts[1].toUpperCase();
    cutoffTime    = parts[2].trim();
    isPrevWeek    = /prev/i.test(override);
  } else {
    const def = defaults[orderDay];
    if (!def) return false;
    cutoffDayName = def.day;
    cutoffTime    = def.time;
    isPrevWeek    = def.prevWeek;
  }

  // Parse the time
  const timeParts = cutoffTime.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!timeParts) return false;
  let h = parseInt(timeParts[1]);
  const m = parseInt(timeParts[2]);
  if (timeParts[3].toUpperCase() === 'PM' && h < 12) h += 12;
  if (timeParts[3].toUpperCase() === 'AM' && h === 12) h = 0;

  // Get the actual date for the cutoff day from DAY_DATES
  // For prevWeek days (MON/TUE/WED), the cutoff day is in the PREVIOUS week
  // so we subtract 7 days from the same-named day tab date
  let cutoffDate;
  if (window.DAY_DATES && window.DAY_DATES[cutoffDayName]) {
    const [mo, dy] = window.DAY_DATES[cutoffDayName].split('/').map(Number);
    cutoffDate = new Date(2026, mo - 1, dy, h, m, 0, 0);
    if (isPrevWeek) cutoffDate.setDate(cutoffDate.getDate() - 7);
  } else {
    // Fallback: calculate from WEEK_MONDAY or hardcoded W14 Monday
    const dayOffsets = { MON:0, TUE:1, WED:2, THU:3, FRI:4, SAT:5, SUN:6 };
    const baseMon = WEEK_MONDAY || new Date(2026, 2, 30); // fallback to W14 Mon 3/30
    cutoffDate = new Date(baseMon);
    cutoffDate.setDate(baseMon.getDate() + (dayOffsets[cutoffDayName] || 0));
    if (isPrevWeek) cutoffDate.setDate(cutoffDate.getDate() - 7);
    cutoffDate.setHours(h, m, 0, 0);
  }

  return new Date() > cutoffDate;
}

async function triggerCreateWeek() {
  if (!MASTER_URL) { toast('No master URL configured','err'); return; }
  const weekNum = parseInt(document.getElementById('wm-weeknum').value);
  if (!weekNum || weekNum < 1) { toast('Enter a valid week number','err'); return; }
  const btn    = document.getElementById('wm-create-btn');
  const status = document.getElementById('wm-status');
  btn.disabled = true;
  btn.textContent = '⏳ Creating & deploying…';
  status.style.color = 'var(--ink3)';
  status.textContent = 'Copying file, updating dates, deploying script… (this can take up to 60 seconds)';

  // Progress pulse so user knows it's working
  let dots = 0;
  const pulse = setInterval(() => {
    dots = (dots + 1) % 4;
    const el = document.getElementById('wm-status');
    if (el && el.style.color !== 'var(--grn)' && el.style.color !== 'var(--acc)') {
      el.textContent = 'Copying file, updating dates, deploying script' + '.'.repeat(dots + 1);
    }
  }, 1500);

  try {
    // Use fetch with a 120s timeout — JSONP can't handle long-running ops
    const controller = new AbortController();
    const timeout    = setTimeout(() => controller.abort(), 120000);

    const res  = await fetch(MASTER_URL + '?action=create_and_go_live&week=' + weekNum, {
      signal: controller.signal,
    });
    clearTimeout(timeout);
    clearInterval(pulse);

    const result = await res.json();
    btn.disabled = false;
    btn.textContent = '＋ Create & Go Live';

    if (result && result.ok) {
      if (result.new_url) SHEETS_URL = result.new_url;
      status.style.color = 'var(--grn)';
      status.textContent = '✓ ' + (result.message || 'W' + weekNum + ' is now live');
      toast('W' + weekNum + ' created and live ✓','ok');
      setTimeout(() => renderWeekMgr(), 800);
    } else {
      status.style.color = 'var(--acc)';
      status.textContent = '✗ ' + (result?.error || 'Something went wrong');
      toast('Failed — check Apps Script logs','err');
    }
  } catch(err) {
    clearInterval(pulse);
    btn.disabled = false;
    btn.textContent = '＋ Create & Go Live';
    status.style.color = 'var(--acc)';
    if (err.name === 'AbortError') {
      status.textContent = '✗ Timed out — the operation may still be running. Check your Drive in a minute.';
    } else {
      status.textContent = '✗ ' + err.message;
    }
    toast('Failed — check Apps Script logs','err');
  }
}

function renderAccessTable() {
  const search = (document.getElementById('access-search')?.value || '').toLowerCase();
  const status = document.getElementById('access-status')?.value || '';
  const region = document.getElementById('access-region')?.value || '';
  const brand  = document.getElementById('access-brand')?.value  || '';

  const rows = Object.values(storeConfig)
    .filter(s => s.order_type !== 'you-all')
    .filter(s => {
      if (search && !s.code.toLowerCase().includes(search) && !(s.brand||'').toLowerCase().includes(search)) return false;
      if (region && s.region !== region) return false;
      if (brand  && s.brand  !== brand)  return false;
      const isActive = s.portal_active !== false;
      if (status === 'active'   && !isActive) return false;
      if (status === 'inactive' &&  isActive) return false;
      return true;
    })
    .sort((a,b) => a.code.localeCompare(b.code));

  const tbody = document.getElementById('access-table-body');
  if (!tbody) return;
  if (!rows.length) { tbody.innerHTML = '<tr><td colspan="7" class="empty">No stores match</td></tr>'; return; }

  tbody.innerHTML = rows.map(s => {
    const isActive = s.portal_active !== false;
    const ot = ORDER_TYPES[s.order_type] || {};
    const checked = window._bulkSel.has(s.code) ? 'checked' : '';
    return `<tr>
      <td><input type="checkbox" ${checked} onchange="bulkToggleOne('${s.code}',this.checked)"></td>
      <td class="tmono">${s.code}</td>
      <td style="font-size:12px;">${s.brand||'—'}</td>
      <td><span class="pill ${s.region==='NORCAL'?'pill-NORCAL':'pill-SOCAL'}">${s.region||'—'}</span></td>
      <td><span class="ot-pill ot-${s.order_type}">${ot.label||s.order_type}</span></td>
      <td>
        <button onclick="toggleStoreActive('${s.code}');renderAccessTable();"
          style="padding:4px 12px;border-radius:10px;border:1px solid ${isActive?'var(--grn-b)':'var(--bdr2)'};background:${isActive?'var(--grn-l)':'var(--surf2)'};color:${isActive?'var(--grn)':'var(--ink3)'};cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;">
          ${isActive ? '● ACTIVE' : '○ INACTIVE'}
        </button>
      </td>
      <td>
        <div style="display:flex;align-items:center;gap:6px;">
          ${s.pin ? `<span style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;color:var(--grn);letter-spacing:1px;">${s.pin}</span>` : ''}
          <input type="text" id="pin-${s.code}"
            placeholder="${s.pin ? 'Change PIN…' : 'Set PIN…'}"
            style="width:90px;padding:4px 8px;background:var(--surf2);border:1px solid var(--bdr);border-radius:5px;font-family:'IBM Plex Mono',monospace;font-size:11px;outline:none;"
            onkeydown="if(event.key==='Enter') saveStorePin('${s.code}')"/>
          <button onclick="saveStorePin('${s.code}')" style="padding:4px 9px;border-radius:5px;border:1px solid var(--bdr2);background:var(--surf);font-size:11px;font-weight:700;cursor:pointer;font-family:'Epilogue',sans-serif;">Set</button>
          ${s.pin ? `<button onclick="clearStorePin('${s.code}')" style="padding:4px 9px;border-radius:5px;border:1px solid var(--bdr2);background:var(--surf);font-size:11px;cursor:pointer;color:var(--acc);font-family:'Epilogue',sans-serif;">Clear</button>` : ''}
        </div>
      </td>
    </tr>`;
  }).join('');

  // Keep select-all in sync
  const allCbs = tbody.querySelectorAll('input[type=checkbox]');
  const selAll = document.getElementById('bulk-sel-all');
  if (selAll) selAll.checked = allCbs.length > 0 && [...allCbs].every(c => c.checked);
}

// ── Bulk selection helpers ────────────────────────────────────

function bulkToggleOne(code, checked) {
  checked ? window._bulkSel.add(code) : window._bulkSel.delete(code);
  updateBulkBar();
  const allCbs = document.querySelectorAll('#access-table-body input[type=checkbox]');
  const selAll = document.getElementById('bulk-sel-all');
  if (selAll) selAll.checked = allCbs.length > 0 && [...allCbs].every(c => c.checked);
}

function bulkToggleAll(checked) {
  document.querySelectorAll('#access-table-body input[type=checkbox]').forEach(cb => {
    cb.checked = checked;
    const tr = cb.closest('tr');
    if (tr) {
      // get code from the tmono cell
      const codeCell = tr.querySelector('.tmono');
      if (codeCell) checked ? window._bulkSel.add(codeCell.textContent) : window._bulkSel.delete(codeCell.textContent);
    }
  });
  updateBulkBar();
}

function clearBulkSel() {
  window._bulkSel = new Set();
  document.querySelectorAll('#access-table-body input[type=checkbox]').forEach(cb => cb.checked = false);
  const selAll = document.getElementById('bulk-sel-all');
  if (selAll) selAll.checked = false;
  updateBulkBar();
}

function updateBulkBar() {
  const bar = document.getElementById('bulk-bar');
  const lbl = document.getElementById('bulk-bar-count');
  const n   = window._bulkSel.size;
  if (bar) { bar.style.display = n > 0 ? 'flex' : 'none'; bar.style.pointerEvents = n > 0 ? 'auto' : 'none'; }
  if (lbl) lbl.textContent = n + ' store' + (n===1?'':'s') + ' selected';
}

function bulkSetActive(active) {
  const codes = [...window._bulkSel].filter(c => storeConfig[c]);
  if (!codes.length) return;
  codes.forEach(code => {
    storeConfig[code].portal_active = active;
    window._pendingChanges.add(code);
  });
  renderAccessTable();
  updateBulkBar();
  updatePendingBar();
  toast(codes.length + ' stores staged — hit Save to confirm', '');
}

function openBulkSkuModal(mode, type) {
  window._bsmMode = mode;

  const isRetail  = type === 'retail';
  const isSet     = mode === 'set';
  if (!window._bulkSel) window._bulkSel = new Set();
